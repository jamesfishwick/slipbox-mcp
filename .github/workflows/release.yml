name: Release

# Automated versioning + PyPI publish, driven by Conventional Commits.
#
# On every push to main, release-please maintains a standing "release PR" that
# bumps __version__ and updates CHANGELOG.md from the commit history. Merging
# that PR tags the release (v<version>) and, in the same workflow run, builds
# and publishes to PyPI via Trusted Publishing (OIDC -- no stored token).
#
# The filename (release.yml) and environment (release) are load-bearing: the
# PyPI trusted publisher matches on exactly those claims. Do not rename either.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Maintain release PR / cut release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    name: Publish to PyPI
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/slipbox-mcp
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel, then verify metadata
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
