name: Release

# Publish to PyPI when a version tag is pushed, e.g. `git tag v1.2.2 && git push --tags`.
# Uses PyPI Trusted Publishing (OIDC) -- no API token is stored in repo secrets.
# One-time setup on PyPI: add a trusted publisher for this repo pointing at the
# `release` environment and this workflow file. See README "Publishing to PyPI".

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($tag) does not match pyproject version ($pkg). Bump the version, commit, then re-tag."
            exit 1
          fi
          echo "Tag and package version agree: $pkg"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/slipbox-mcp
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
